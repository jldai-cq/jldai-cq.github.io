<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unicode编码转换器</title>
<script>
function encodeUnicode() {
    var sentence = document.getElementById("sentence").value;
    if (sentence === '退出') {
        alert("程序已退出。");
        return;
    }
    var unicodeSentence = '';
    for (var i = 0; i < sentence.length; i++) {
        unicodeSentence += '\\u' + ('0000' + sentence.charCodeAt(i).toString(16)).slice(-4);
    }
    document.getElementById("unicodeResult").innerText = "Unicode编码：" + unicodeSentence;

    try {
        var decodedSentence = unescape(unicodeSentence);
        document.getElementById("decodedResult").innerText = "对应的中文：" + decodedSentence;
    } catch (e) {
        document.getElementById("decodedResult").innerText = "解码错误，请确保输入的是有效的Unicode编码。";
    }
}
</script>
</head>
<body>
<h1>Unicode编码转换器</h1>
<input type="text" id="sentence" placeholder="请输入一句话（输入'退出'来结束程序）">
<button onclick="encodeUnicode()">转换</button>
<p id="unicodeResult"></p>
<p id="decodedResult"></p>
</body>
</html>
